server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /health check proxied to backend
    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # NOTE: In production Docker, the frontend axios client uses
    # VITE_API_URL=http://backend:8000 so POST /chat goes directly to
    # the backend container — Nginx does not proxy it.
    # In local dev, the Vite proxy config handles /chat -> backend.
}
